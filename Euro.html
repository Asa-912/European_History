<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ducktator's Rise — A History Comic</title>
<style>
  :root {
    --page-w: min(750px, 92vw);
    --page-h: calc(var(--page-w) * 1.05);
    --cream: #faf3e0;
    --brown: #5c3d2e;
    --dark: #2c1810;
    --red: #c0392b;
    --muted-red: #a04040;
    --blue: #3a5a8c;
    --gold: #d4a843;
    --grey: #7f8c8d;
    --light-grey: #bdc3c7;
    --panel-gap: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x: hidden;
    padding: 12px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .book-stage {
    perspective: 2200px;
    perspective-origin: center center;
    width: var(--page-w);
    height: var(--page-h);
    position: relative;
    margin-bottom: 14px;
  }

  .page {
    position: absolute; inset: 0;
    background: var(--cream);
    border: 4px solid #3e2216;
    border-radius: 6px 12px 12px 6px;
    box-shadow:
      0 2px 20px rgba(0,0,0,.55),
      inset 0 0 60px rgba(139,90,43,.08);
    overflow: hidden;
    transform-origin: left center;
    transition: transform .65s cubic-bezier(.4, 0, .2, 1), z-index 0s;
    backface-visibility: hidden;
    will-change: transform;
    display: flex; flex-direction: column;
    z-index: 1;
  }
  .page.flipped {
    transform: rotateY(-178deg);
    z-index: 0;
    transition: transform .7s cubic-bezier(.4, 0, .2, 1), z-index 0s .35s;
  }
  .page.turned-away {
    transform: rotateY(-178deg);
    z-index: 0;
  }
  .page.active { z-index: 10; }

  .page-inner {
    flex: 1; display: flex; flex-direction: column;
    padding: 10px 16px; overflow-y: auto;
    position: relative;
  }
  .page-inner::-webkit-scrollbar { width: 4px; }
  .page-inner::-webkit-scrollbar-thumb { background: #c9a87c; border-radius: 4px; }

  .page-number {
    text-align: center; font-size: .7rem; color: #8b7355;
    padding: 4px 0 2px; letter-spacing: 2px;
  }

  /* Cover / Back Cover */
  .cover-page {
    background: linear-gradient(160deg, #1a0a00 0%, #3e1a0a 30%, #6b2f1a 60%, #1a0a00 100%) !important;
    border-color: #1a0a00 !important; color: #f0d9a0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 30px 24px;
  }
  .cover-page .title {
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    font-weight: bold; letter-spacing: 2px;
    text-shadow: 0 0 20px #c0392b, 0 2px 4px #000;
    margin-bottom: 6px;
  }
  .cover-page .subtitle {
    font-size: clamp(.8rem, 1.5vw, 1.05rem);
    color: #d4a843; letter-spacing: 3px; margin-bottom: 18px;
  }
  .cover-page .byline {
    font-size: .75rem; color: #a08060; margin-top: 10px;
  }

  .back-cover {
    background: linear-gradient(160deg, #1a0a00 0%, #3e1a0a 40%, #1a0a00 100%) !important;
    border-color: #1a0a00 !important; color: #f0d9a0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 22px;
  }

  /* Panels */
  .panels {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
    gap: var(--panel-gap);
    align-content: start;
  }
  .panel {
    background: #fffef9; border: 2.5px solid #3e2216;
    border-radius: 4px; padding: 7px 9px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 82px;
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  .panel.full { grid-column: 1 / -1; min-height: 105px; }
  .panel.wide { grid-column: 1 / -1; min-height: 115px; }
  .panel.tall { grid-row: span 2; }

  .panel .scene { flex: 1; position: relative; min-height: 50px; }

  .narration {
    font-size: .6rem; color: #3e2216; font-style: italic;
    font-family: 'Georgia', serif; line-height: 1.35;
    background: rgba(250,243,224,.7); padding: 3px 7px;
    border-left: 3px solid #c9a87c; margin-top: 3px;
    border-radius: 0 3px 3px 0;
  }
  .narration.top { margin-top: 0; margin-bottom: 2px; }

  .speech {
    position: absolute; background: #fff; border: 2px solid #3e2216;
    border-radius: 10px; padding: 3px 7px; font-size: .6rem;
    line-height: 1.25; max-width: 60%; z-index: 5;
    font-family: 'Georgia', serif;
  }
  .speech::after {
    content: ''; position: absolute; bottom: -8px;
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 8px solid #3e2216;
  }
  .speech::before {
    content: ''; position: absolute; bottom: -5px;
    width: 0; height: 0; z-index: 1;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 6px solid #fff;
  }
  .speech.left::after { left: 14px; }
  .speech.left::before { left: 16px; }
  .speech.right::after { right: 14px; }
  .speech.right::before { right: 16px; }

  /* Controls */
  .controls {
    display: flex; gap: 18px; align-items: center;
    font-family: 'Georgia', serif;
  }
  .btn {
    background: #3e2216; color: #faf3e0; border: none;
    padding: 10px 24px; border-radius: 6px; cursor: pointer;
    font-size: .9rem; font-family: 'Georgia', serif;
    letter-spacing: 1px; transition: background .2s, transform .1s;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .btn:hover { background: #5c3d2e; }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .35; cursor: default; }

  .page-indicator {
    color: #faf3e0; font-size: .85rem;
    letter-spacing: 1px; min-width: 80px; text-align: center;
  }

  svg.duck-art { width: 100%; height: 100%; display: block; }

  .page::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0;
    width: 10px; background: linear-gradient(to right, rgba(0,0,0,.05), rgba(0,0,0,.15));
    border-radius: 0 8px 8px 0; pointer-events: none;
  }

  @media (max-width: 600px) {
    .panels { grid-template-columns: 1fr; }
    .panel.tall { grid-row: span 1; }
    .page-inner { padding: 6px 5px; }
    .speech { font-size: .55rem; padding: 2px 5px; }
    .narration { font-size: .55rem; padding: 2px 5px; }
  }
</style>
</head>
<body>

<div class="book-stage" id="bookStage"></div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="book.prev()">&#9664; Prev</button>
  <span class="page-indicator" id="pageInd">1 / 12</span>
  <button class="btn" id="nextBtn" onclick="book.next()">Next &#9654;</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  SVG ART LIBRARY — Duck characters and scenes
// ═══════════════════════════════════════════════
const S = {};

// ── Shared anime eye parts ──
S._eyeHappy = (cx,cy) => `
  <ellipse cx="${cx}" cy="${cy}" rx="7" ry="8.5" fill="#fff" stroke="#2a1a0a" stroke-width="1.2"/>
  <ellipse cx="${cx+1.5}" cy="${cy}" rx="5" ry="6.5" fill="#5b8c5a"/>
  <circle cx="${cx+2}" cy="${cy}" r="3.2" fill="#1a1a1a"/>
  <circle cx="${cx+3.2}" cy="${cy-2.2}" r="1.6" fill="#fff"/>
  <circle cx="${cx+0.5}" cy="${cy+1.5}" r=".7" fill="#fff"/>
  <path d="M${cx-6},${cy-8} Q${cx},${cy-12} ${cx+6},${cy-8}" fill="none" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>`;

S._eyeSad = (cx,cy) => `
  <ellipse cx="${cx}" cy="${cy}" rx="6.5" ry="8" fill="#fff" stroke="#2a1a0a" stroke-width="1.2"/>
  <ellipse cx="${cx+1}" cy="${cy+1}" rx="4.5" ry="6" fill="#7a9a9a"/>
  <circle cx="${cx+1.5}" cy="${cy+1.5}" r="2.8" fill="#1a1a1a"/>
  <circle cx="${cx+2.5}" cy="${cy-0.5}" r="1.2" fill="#fff"/>
  <path d="M${cx-5},${cy+9} Q${cx},${cy+12} ${cx+5},${cy+9}" fill="none" stroke="#2a1a0a" stroke-width="1.2" stroke-linecap="round"/>`;

S._eyeAngry = (cx,cy) => `
  <ellipse cx="${cx}" cy="${cy}" rx="6" ry="7.5" fill="#fff" stroke="#2a1a0a" stroke-width="1.3"/>
  <ellipse cx="${cx+0.5}" cy="${cy}" rx="4" ry="5.5" fill="#c0392b"/>
  <circle cx="${cx+1}" cy="${cy}" r="2.5" fill="#0a0a0a"/>
  <circle cx="${cx+2}" cy="${cy-2}" r="1.1" fill="#fff"/>
  <path d="M${cx-7},${cy-9} L${cx-1},${cy-5.5} L${cx+5},${cy-9}" fill="none" stroke="#2a1a0a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;

S._eyeScared = (cx,cy) => `
  <circle cx="${cx}" cy="${cy}" r="7.5" fill="#fff" stroke="#2a1a0a" stroke-width="1.2"/>
  <circle cx="${cx+0.5}" cy="${cy}" r="5.5" fill="#3a3a5a"/>
  <circle cx="${cx+0.5}" cy="${cy}" r="3" fill="#1a1a1a"/>
  <circle cx="${cx+2}" cy="${cy-2.2}" r="1.3" fill="#fff"/>
  <path d="M${cx-6},${cy-9} Q${cx},${cy-7} ${cx+6},${cy-9}" fill="none" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>`;

S._beak = (cx,cy,color='#f0a040') => `
  <path d="M${cx},${cy-3} L${cx+16},${cy} L${cx},${cy+3} Z" fill="${color}" stroke="#d08020" stroke-width=".8" stroke-linejoin="round"/>
  <circle cx="${cx+4}" cy="${cy-0.5}" r=".8" fill="#c07020"/>`;

// ═══════════════════════════════════════
//  CIVILIAN DUCK — cute, round, expressive
// ═══════════════════════════════════════
S.civilianDuck = (c='#f5deb3', wc='#e8d5a0', s=1) => `
<g transform="scale(${s})">
  <defs>
    <radialGradient id="gradBody_${c.slice(1)}" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".25"/><stop offset="100%" stop-color="#000" stop-opacity=".1"/></radialGradient>
  </defs>
  <!-- Feet -->
  <ellipse cx="37" cy="94" rx="8" ry="4.5" fill="#e89830" stroke="#c07020" stroke-width=".6"/>
  <ellipse cx="57" cy="94" rx="8" ry="4.5" fill="#e89830" stroke="#c07020" stroke-width=".6"/>
  <line x1="33" y1="94" x2="29" y2="96" stroke="#e89830" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="95" x2="35" y2="98" stroke="#e89830" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="94" x2="49" y2="96" stroke="#e89830" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="95" x2="55" y2="98" stroke="#e89830" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="24" ry="32" fill="url(#gradBody_${c.slice(1)})"/>
  <ellipse cx="50" cy="62" rx="24" ry="32" fill="${c}"/>
  <!-- Belly highlight -->
  <ellipse cx="52" cy="68" rx="14" ry="18" fill="#fff" opacity=".15"/>
  <!-- Neck -->
  <ellipse cx="50" cy="42" rx="13" ry="10" fill="${c}"/>
  <!-- Head -->
  <circle cx="50" cy="26" r="18" fill="${c}"/>
  <!-- Cheek blush -->
  <ellipse cx="36" cy="30" rx="4" ry="2.5" fill="#e8a0a0" opacity=".35"/>
  <!-- Head feather tuft -->
  <path d="M44,10 Q48,2 52,8" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M46,10 Q52,1 56,9" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes (happy anime) -->
  ${S._eyeHappy(45,24)}
  ${S._eyeHappy(60,24)}
  <!-- Beak -->
  ${S._beak(65,27)}
  <!-- Wing -->
  <ellipse cx="36" cy="58" rx="14" ry="10" fill="${wc}" stroke="#d0c090" stroke-width=".5" transform="rotate(-14 36 58)"/>
  <path d="M28,54 Q36,52 42,56" fill="none" stroke="#c0b080" stroke-width=".6" opacity=".5"/>
  <path d="M27,58 Q35,56 41,60" fill="none" stroke="#c0b080" stroke-width=".6" opacity=".5"/>
  <!-- Tail feathers -->
  <path d="M27,78 Q18,74 22,82" fill="${wc}" stroke="#c0b080" stroke-width=".5"/>
  <path d="M26,74 Q16,70 19,78" fill="${wc}" stroke="#c0b080" stroke-width=".5"/>
</g>`;

// ═══════════════════════════════════════
//  HITLER DUCK — angular, intense, menacing
// ═══════════════════════════════════════
S.hitlerDuck = (s=1) => `
<g transform="scale(${s})">
  <defs>
    <radialGradient id="gradHit" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".15"/><stop offset="100%" stop-color="#000" stop-opacity=".15"/></radialGradient>
  </defs>
  <!-- Feet -->
  <ellipse cx="37" cy="94" rx="8" ry="4.5" fill="#d08030" stroke="#a06020" stroke-width=".6"/>
  <ellipse cx="57" cy="94" rx="8" ry="4.5" fill="#d08030" stroke="#a06020" stroke-width=".6"/>
  <line x1="33" y1="94" x2="29" y2="96" stroke="#d08030" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="95" x2="35" y2="98" stroke="#d08030" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="94" x2="49" y2="96" stroke="#d08030" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="95" x2="55" y2="98" stroke="#d08030" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (brown uniform) -->
  <ellipse cx="50" cy="62" rx="24" ry="32" fill="url(#gradHit)"/>
  <ellipse cx="50" cy="62" rx="24" ry="32" fill="#9b8b70"/>
  <!-- Uniform details -->
  <rect x="38" y="52" width="24" height="5" rx="1" fill="#7a6a50"/>
  <rect x="40" y="47" width="20" height="6" rx="1" fill="#6b5b40"/>
  <!-- Red armband -->
  <rect x="30" y="54" width="7" height="12" rx="1" fill="#8b0000"/>
  <!-- Neck -->
  <ellipse cx="50" cy="42" rx="12" ry="9" fill="#d4c5a0"/>
  <!-- Head -->
  <circle cx="50" cy="26" r="18" fill="#d4c5a0"/>
  <!-- Swept hair (Hitler's iconic side-part) -->
  <path d="M34,14 Q44,4 58,10 Q62,12 60,14 Q50,8 38,16 Z" fill="#3e2a14"/>
  <path d="M36,12 Q46,3 56,9" fill="none" stroke="#2a1a08" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M40,10 L42,20" fill="none" stroke="#3e2a14" stroke-width="2"/>
  <!-- Mustache (the iconic small rectangle) -->
  <rect x="44" y="35" width="14" height="5" rx="2" fill="#3e2a14"/>
  <rect x="45" y="35.5" width="12" height="2" rx="1" fill="#4a3a24"/>
  <!-- Intense anime eyes -->
  ${S._eyeAngry(44,23)}
  ${S._eyeAngry(61,23)}
  <!-- Deep frown lines between eyes -->
  <line x1="52" y1="16" x2="55" y2="22" stroke="#8b7355" stroke-width=".8"/>
  <!-- Beak (slightly sharper) -->
  <path d="M65,27 L84,30 L65,34 Z" fill="#e09030" stroke="#c07020" stroke-width=".8" stroke-linejoin="round"/>
  <circle cx="70" cy="29" r=".8" fill="#a06020"/>
  <!-- Wing (at side, stiff posture) -->
  <ellipse cx="34" cy="58" rx="13" ry="9" fill="#8b7b60" transform="rotate(-8 34 58)"/>
</g>`;

// ═══════════════════════════════════════
//  HITLER SPEAKING — dramatic, arm raised
// ═══════════════════════════════════════
S.hitlerSpeaking = (s=1) => `
<g transform="scale(${s})">
  <defs>
    <radialGradient id="gradHitS" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".12"/><stop offset="100%" stop-color="#000" stop-opacity=".18"/></radialGradient>
  </defs>
  <!-- Feet (planted wide, aggressive stance) -->
  <ellipse cx="32" cy="94" rx="8" ry="4.5" fill="#d08030" stroke="#a06020" stroke-width=".6"/>
  <ellipse cx="60" cy="94" rx="8" ry="4.5" fill="#d08030" stroke="#a06020" stroke-width=".6"/>
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="24" ry="32" fill="url(#gradHitS)"/>
  <ellipse cx="50" cy="60" rx="24" ry="32" fill="#9b8b70"/>
  <rect x="38" y="50" width="24" height="5" rx="1" fill="#7a6a50"/>
  <rect x="40" y="45" width="20" height="6" rx="1" fill="#6b5b40"/>
  <rect x="28" y="52" width="7" height="12" rx="1" fill="#8b0000"/>
  <!-- Raised wing/arm (dramatic gesture) -->
  <path d="M32,48 Q18,30 22,12" fill="none" stroke="#9b8b70" stroke-width="9" stroke-linecap="round"/>
  <path d="M32,48 Q18,30 22,12" fill="none" stroke="#b0a080" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="22" cy="10" rx="8" ry="5" fill="#d4c5a0" transform="rotate(-20 22 10)"/>
  <!-- Neck -->
  <ellipse cx="50" cy="40" rx="12" ry="9" fill="#d4c5a0"/>
  <!-- Head (tilted up, shouting) -->
  <circle cx="50" cy="24" r="18" fill="#d4c5a0"/>
  <!-- Hair -->
  <path d="M34,13 Q44,3 58,9 Q62,11 60,13 Q50,7 38,15 Z" fill="#3e2a14"/>
  <path d="M36,11 Q46,2 56,8" fill="none" stroke="#2a1a08" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Mustache -->
  <rect x="44" y="33" width="14" height="5" rx="2" fill="#3e2a14"/>
  <!-- Wide-open mouth (shouting) -->
  <ellipse cx="68" cy="28" rx="5" ry="7" fill="#2a1a0a"/>
  <ellipse cx="68" cy="26" rx="3" ry="3.5" fill="#8b2020"/>
  <!-- Intense angry eyes -->
  ${S._eyeAngry(43,22)}
  ${S._eyeAngry(60,21)}
  <!-- Action/speed lines around head -->
  <line x1="28" y1="10" x2="20" y2="6" stroke="#c0392b" stroke-width="1.2" opacity=".5"/>
  <line x1="30" y1="20" x2="18" y2="18" stroke="#c0392b" stroke-width="1" opacity=".4"/>
  <line x1="78" y1="10" x2="88" y2="6" stroke="#c0392b" stroke-width="1.2" opacity=".5"/>
  <!-- Beak (open) -->
  <path d="M63,26 L80,28 L64,32 Z" fill="#e09030" stroke="#c07020" stroke-width=".8"/>
</g>`;

// ═══════════════════════════════════════
//  SAD DUCK — drooping, tearful
// ═══════════════════════════════════════
S.sadDuck = (c='#f5deb3', s=1) => `
<g transform="scale(${s})">
  <defs>
    <radialGradient id="gradSad_${c.slice(1)}" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".2"/><stop offset="100%" stop-color="#000" stop-opacity=".12"/></radialGradient>
  </defs>
  <!-- Feet (together, timid) -->
  <ellipse cx="42" cy="94" rx="7" ry="4" fill="#e89830" stroke="#c07020" stroke-width=".6"/>
  <ellipse cx="56" cy="94" rx="7" ry="4" fill="#e89830" stroke="#c07020" stroke-width=".6"/>
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="23" ry="31" fill="url(#gradSad_${c.slice(1)})"/>
  <ellipse cx="50" cy="62" rx="23" ry="31" fill="${c}"/>
  <!-- Neck -->
  <ellipse cx="50" cy="42" rx="12" ry="9" fill="${c}"/>
  <!-- Head (slightly lowered) -->
  <circle cx="50" cy="28" r="17" fill="${c}"/>
  <!-- Drooping feather tuft -->
  <path d="M44,13 Q48,7 52,13" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"/>
  <!-- Sad anime eyes -->
  ${S._eyeSad(43,26)}
  ${S._eyeSad(58,26)}
  <!-- Tiny tear drop -->
  <ellipse cx="36" cy="31" rx="1.8" ry="2.5" fill="#7ab8e0" opacity=".8"/>
  <circle cx="35.5" cy="34" r="1" fill="#7ab8e0" opacity=".6"/>
  <!-- Droopy beak (slight frown) -->
  <path d="M64,29 L78,31 L64,34 Z" fill="#e89830" stroke="#c07020" stroke-width=".7"/>
  <!-- Wing (hanging low) -->
  <ellipse cx="38" cy="60" rx="14" ry="9" fill="${c}" stroke="#d0c090" stroke-width=".5" opacity=".7" transform="rotate(-5 38 60)"/>
  <!-- Slumped posture line -->
  <path d="M40,36 Q44,38 48,36" fill="none" stroke="#c0a080" stroke-width=".6" opacity=".5"/>
</g>`;

// ═══════════════════════════════════════
//  HOPEFUL DUCK — bright eyes, smiling
// ═══════════════════════════════════════
S.hopefulDuck = (c='#f5deb3', s=1) => `
<g transform="scale(${s})">
  <defs>
    <radialGradient id="gradHope_${c.slice(1)}" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".3"/><stop offset="100%" stop-color="#000" stop-opacity=".08"/></radialGradient>
  </defs>
  <!-- Feet -->
  <ellipse cx="37" cy="94" rx="8" ry="4.5" fill="#f0a840" stroke="#c07020" stroke-width=".6"/>
  <ellipse cx="57" cy="94" rx="8" ry="4.5" fill="#f0a840" stroke="#c07020" stroke-width=".6"/>
  <!-- Body (slightly puffed, optimistic) -->

// ═══════════════════════════════════════════════
//  BOOK CONTROLLER — Page flip & navigation
// ═══════════════════════════════════════════════
class ComicBook {
  constructor() {
    this.current = 0;
    this.total = pages.length;
    this.animating = false;
    this.stage = document.getElementById('bookStage');
    this.pageInd = document.getElementById('pageInd');
    this.prevBtn = document.getElementById('prevBtn');
    this.nextBtn = document.getElementById('nextBtn');
    this.pageEls = [];

    this.buildPages();
    this.showPage(0);

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault(); this.next();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); this.prev();
      }
    });

    let touchX = 0;
    this.stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
    this.stage.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchX;
      if (dx < -50) this.next();
      else if (dx > 50) this.prev();
    });
  }

  buildPages() {
    this.stage.innerHTML = '';
    this.pageEls = [];
    pages.forEach((pg, i) => {
      const el = document.createElement('div');
      el.className = 'page' + (i === 0 ? ' active' : '');
      el.style.zIndex = this.total - i;
      el.innerHTML = `
        <div class="page-inner">
          ${pg.type === 'cover' ? pg.content : pg.type === 'back' ? pg.content : pg.panels}
        </div>
        <div class="page-number">${i === 0 ? '' : i === this.total - 1 ? '' : i}</div>
      `;
      this.stage.appendChild(el);
      this.pageEls.push(el);
    });
  }

  showPage(idx) {
    this.current = Math.max(0, Math.min(idx, this.total - 1));
    this.pageEls.forEach((el, i) => {
      el.classList.remove('active', 'flipped', 'turned-away');
      if (i < this.current) el.classList.add('turned-away');
      else if (i === this.current) el.classList.add('active');
      el.style.zIndex = i <= this.current ? this.total - i : this.total - i;
    });
    this.pageEls[this.current].style.zIndex = this.total + 1;
    this.updateUI();
  }

  next() {
    if (this.animating || this.current >= this.total - 1) return;
    this.animating = true;
    const cur = this.pageEls[this.current];
    cur.classList.add('flipped');
    cur.classList.remove('active');
    this.current++;
    this.pageEls[this.current].classList.add('active');
    this.pageEls[this.current].style.zIndex = this.total + 1;
    this.updateUI();
    setTimeout(() => { this.animating = false; }, 700);
  }

  prev() {
    if (this.animating || this.current <= 0) return;
    this.animating = true;
    this.current--;
    const prev = this.pageEls[this.current];
    prev.classList.remove('flipped', 'turned-away');
    prev.classList.add('active');
    prev.style.zIndex = this.total + 1;
    this.pageEls[this.current + 1].classList.remove('active');
    this.updateUI();
    setTimeout(() => { this.animating = false; }, 700);
  }

  updateUI() {
    this.pageInd.textContent = `${this.current + 1} / ${this.total}`;
    this.prevBtn.disabled = this.current === 0;
    this.nextBtn.disabled = this.current >= this.total - 1;
  }
}
